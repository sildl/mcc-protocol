[profile.default]
src = "contracts"
out = "foundry-out"
libs = ["node_modules"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 10000, seed = "0x1337" }
invariant = { runs = 256, depth = 128 }

[profile.ci]
fuzz = { runs = 100000 }
invariant = { runs = 1024, depth = 256 }

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
