<svg width="680" height="160" viewBox="0 0 680 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="680" height="160" rx="12" fill="url(#bg)"/>
  <!-- Neural mesh lines -->
  <g stroke="#0891b2" stroke-width="0.3" opacity="0.2">
    <line x1="50" y1="30" x2="180" y2="80"/>
    <line x1="180" y1="80" x2="120" y2="140"/>
    <line x1="120" y1="140" x2="280" y2="110"/>
    <line x1="280" y1="110" x2="180" y2="80"/>
    <line x1="500" y1="40" x2="580" y2="90"/>
    <line x1="580" y1="90" x2="630" y2="50"/>
    <line x1="580" y1="90" x2="550" y2="140"/>
    <line x1="550" y1="140" x2="640" y2="130"/>
    <line x1="500" y1="40" x2="550" y2="140"/>
  </g>
  <!-- Nodes -->
  <g fill="#22d3ee" opacity="0.3">
    <circle cx="50" cy="30" r="2.5"/>
    <circle cx="180" cy="80" r="3"/>
    <circle cx="120" cy="140" r="2"/>
    <circle cx="280" cy="110" r="2.5"/>
    <circle cx="500" cy="40" r="2"/>
    <circle cx="580" cy="90" r="3"/>
    <circle cx="630" cy="50" r="2"/>
    <circle cx="550" cy="140" r="2.5"/>
    <circle cx="640" cy="130" r="2"/>
  </g>
  <!-- Logo circle -->
  <circle cx="290" cy="65" r="22" fill="url(#accent)"/>
  <text x="290" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#030712">M</text>
  <!-- Title -->
  <text x="340" y="60" font-family="Georgia, serif" font-size="24" fill="#f9fafb" font-weight="400" letter-spacing="-0.5">Multi-Chain</text>
  <text x="340" y="85" font-family="Georgia, serif" font-size="24" fill="#22d3ee" font-weight="400" font-style="italic" letter-spacing="-0.5">Consciousness</text>
  <!-- Tagline -->
  <text x="340" y="118" font-family="monospace" font-size="11" fill="#6b7280" letter-spacing="0.5">TRUSTLESS CROSS-CHAIN STATE VERIFICATION</text>
  <!-- Accent line -->
  <rect x="340" y="128" width="60" height="1.5" rx="1" fill="url(#accent)" opacity="0.5"/>
</svg>
