name: Slither

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  slither:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - uses: crytic/slither-action@v0.4.0
        with:
          fail-on: high
        continue-on-error: true
